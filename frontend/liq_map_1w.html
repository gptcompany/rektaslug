<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidation Map - 1 Week (Binance)</title>
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 id="pageTitle"></h1>
    <p id="lastDataPoint" style="color: #8b949e; margin-top: -10px; margin-bottom: 10px; font-size: 0.9em;"></p>
    <span id="currentPrice" style="color: #f0b90b; font-weight: bold;"></span>
    <div id="liquidation-map" style="width: 100%; height: 600px;"></div>

    <script>
        // Leverage tier colors (matches Coinglass style)
        const LEVERAGE_COLORS = {
            '5x': '#5dd3d3',   // Cyan
            '10x': '#6ba3ff',  // Blue
            '25x': '#4a90e2',  // Dark Blue
            '50x': '#ff9f40',  // Orange
            '100x': '#ff6384'  // Pink/Red
        };

        // Read symbol from URL path: /liq_map_1w/BTCUSDT or ?symbol=BTCUSDT
        function getSymbol() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('symbol') || 'BTCUSDT';
        }

        // Read chart mode from URL: ?chart=area or ?chart=bar (default: bar)
        const urlParams = new URLSearchParams(window.location.search);
        const CHART_MODE = urlParams.get('chart') || 'bar';

        async function loadLevels() {
            const symbol = getSymbol();
            const displaySymbol = symbol.replace('USDT', '/USDT');
            document.getElementById('pageTitle').textContent = `${displaySymbol} Liquidation Map - 1 Week (Binance)`;
            document.title = `${displaySymbol} Liquidation Map - 1W (Binance)`;

            try {
                const response = await fetch(`/liquidations/levels?symbol=${symbol}&model=openinterest&timeframe=7`);
                const data = await response.json();

                renderLiquidationMap(data, symbol);
            } catch (error) {
                console.error('Error loading levels:', error);
                alert(`Error: ${error.message}`);
            }
        }

        function buildBarTraces(longsByLeverage, shortsByLeverage, seenLeverages) {
            const traces = [];
            Object.keys(longsByLeverage).sort().forEach(leverage => {
                const levels = longsByLeverage[leverage];
                const showInLegend = !seenLeverages.has(leverage);
                seenLeverages.add(leverage);
                traces.push({
                    x: levels.map(l => parseFloat(l.price_level)),
                    y: levels.map(l => parseFloat(l.volume)),
                    type: 'bar',
                    name: `${leverage} Leverage`,
                    marker: { color: LEVERAGE_COLORS[leverage] || '#888' },
                    hovertemplate: `Price: $%{x}<br>Volume: %{y:.2f}<br>Leverage: ${leverage}<extra></extra>`,
                    legendgroup: leverage,
                    showlegend: showInLegend,
                    yaxis: 'y'
                });
            });
            Object.keys(shortsByLeverage).sort().forEach(leverage => {
                const levels = shortsByLeverage[leverage];
                const showInLegend = !seenLeverages.has(leverage);
                seenLeverages.add(leverage);
                traces.push({
                    x: levels.map(l => parseFloat(l.price_level)),
                    y: levels.map(l => parseFloat(l.volume)),
                    type: 'bar',
                    name: `${leverage} Leverage`,
                    marker: { color: LEVERAGE_COLORS[leverage] || '#888' },
                    hovertemplate: `Price: $%{x}<br>Volume: %{y:.2f}<br>Leverage: ${leverage}<extra></extra>`,
                    legendgroup: leverage,
                    showlegend: showInLegend,
                    yaxis: 'y'
                });
            });
            return traces;
        }

        function buildAreaTraces(longsByLeverage, shortsByLeverage, seenLeverages) {
            const traces = [];

            function addAreaTrace(levels, leverage, stackGroup, showInLegend) {
                const sorted = [...levels].sort((a, b) => parseFloat(a.price_level) - parseFloat(b.price_level));
                traces.push({
                    x: sorted.map(l => parseFloat(l.price_level)),
                    y: sorted.map(l => parseFloat(l.volume)),
                    type: 'scatter',
                    mode: 'lines',
                    name: `${leverage} Leverage`,
                    line: { width: 0.5, color: LEVERAGE_COLORS[leverage] || '#888' },
                    fillcolor: (LEVERAGE_COLORS[leverage] || '#888') + 'AA',
                    stackgroup: stackGroup,
                    hovertemplate: `Price: $%{x}<br>Volume: %{y:.2f}<br>Leverage: ${leverage}<extra></extra>`,
                    legendgroup: leverage,
                    showlegend: showInLegend,
                    yaxis: 'y'
                });
            }

            Object.keys(longsByLeverage).sort().forEach(leverage => {
                const showInLegend = !seenLeverages.has(leverage);
                seenLeverages.add(leverage);
                addAreaTrace(longsByLeverage[leverage], leverage, 'long', showInLegend);
            });

            Object.keys(shortsByLeverage).sort().forEach(leverage => {
                const showInLegend = !seenLeverages.has(leverage);
                seenLeverages.add(leverage);
                addAreaTrace(shortsByLeverage[leverage], leverage, 'short', showInLegend);
            });

            return traces;
        }

        function renderLiquidationMap(data, symbol) {
            const currentPrice = parseFloat(data.current_price);
            document.getElementById('currentPrice').textContent = `Current Price: $${currentPrice.toLocaleString()}`;

            // Show last data point timestamp
            const lastTs = data.last_data_timestamp || new Date().toISOString();
            const lastDate = new Date(lastTs);
            document.getElementById('lastDataPoint').textContent =
                `Last data: ${lastDate.toISOString().replace('T', ' ').substring(0, 19)} UTC`;

            // Group by leverage tier
            const longsByLeverage = groupByLeverage(data.long_liquidations);
            const shortsByLeverage = groupByLeverage(data.short_liquidations);

            const seenLeverages = new Set();
            let traces;

            if (CHART_MODE === 'area') {
                traces = buildAreaTraces(longsByLeverage, shortsByLeverage, seenLeverages);
            } else {
                traces = buildBarTraces(longsByLeverage, shortsByLeverage, seenLeverages);
            }

            // Calculate cumulative distributions (Coinglass style: start from current price)
            const allPrices = [...new Set([
                ...data.long_liquidations.map(l => parseFloat(l.price_level)),
                ...data.short_liquidations.map(l => parseFloat(l.price_level))
            ])].sort((a, b) => a - b);

            const cumulativeLong = calculateCumulative(data.long_liquidations, allPrices, currentPrice, true);
            const cumulativeShort = calculateCumulative(data.short_liquidations, allPrices, currentPrice, false);

            // Cumulative Long line (red, descending from left)
            traces.push({
                x: cumulativeLong.prices,
                y: cumulativeLong.values,
                type: 'scatter',
                mode: 'lines',
                name: 'Cumulative Long Liquidation Leverage',
                line: { color: '#d9024b', width: 2 },
                yaxis: 'y2'
            });

            // Cumulative Short line (green, ascending from left)
            traces.push({
                x: cumulativeShort.prices,
                y: cumulativeShort.values,
                type: 'scatter',
                mode: 'lines',
                name: 'Cumulative Short Liquidation Leverage',
                line: { color: '#45bf87', width: 2 },
                yaxis: 'y2'
            });

            // Current price vertical line
            const allVolumes = [
                ...data.long_liquidations.map(l => parseFloat(l.volume)),
                ...data.short_liquidations.map(l => parseFloat(l.volume))
            ];
            const maxVolume = allVolumes.length > 0 ? Math.max(...allVolumes) : 0;

            traces.push({
                x: [currentPrice, currentPrice],
                y: [0, maxVolume],
                type: 'scatter',
                mode: 'lines',
                name: `Current Price: ${currentPrice}`,
                line: { color: '#ff0000', width: 2, dash: 'dash' },
                hoverinfo: 'skip',
                yaxis: 'y'
            });

            const layout = {
                xaxis: {
                    title: 'Price Level (USD)',
                    showgrid: true,
                    gridcolor: '#30363d',
                    tickformat: ',.0f'
                },
                yaxis: {
                    title: 'Liquidation Volume',
                    showgrid: true,
                    gridcolor: '#30363d',
                    side: 'left'
                },
                yaxis2: {
                    title: 'Cumulative Liquidation Leverage',
                    overlaying: 'y',
                    side: 'right',
                    showgrid: false
                },
                paper_bgcolor: '#0d1117',
                plot_bgcolor: '#0d1117',
                font: { color: '#c9d1d9' },
                barmode: 'stack',
                bargap: 0.1,
                legend: {
                    orientation: 'h',
                    yanchor: 'bottom',
                    y: 1.02,
                    xanchor: 'right',
                    x: 1
                },
                hovermode: 'closest',
                margin: { t: 30 }
            };

            Plotly.newPlot('liquidation-map', traces, layout, {responsive: true});
        }

        function groupByLeverage(liquidations) {
            const grouped = {};
            liquidations.forEach(liq => {
                const leverage = liq.leverage;
                if (!grouped[leverage]) {
                    grouped[leverage] = [];
                }
                grouped[leverage].push(liq);
            });
            return grouped;
        }

        function calculateCumulative(liquidations, allPrices, currentPrice, isLong = false) {
            const prices = [];
            const values = [];
            const sortedPrices = [...allPrices].sort((a, b) => a - b);

            if (isLong) {
                let cumulativeSum = 0;
                for (let i = sortedPrices.length - 1; i >= 0; i--) {
                    const price = sortedPrices[i];
                    const volumeAtPrice = liquidations
                        .filter(l => parseFloat(l.price_level) === price)
                        .reduce((sum, l) => sum + parseFloat(l.volume), 0);
                    cumulativeSum += volumeAtPrice;
                    prices.unshift(price);
                    values.unshift(cumulativeSum);
                }
            } else {
                let cumulativeSum = 0;
                sortedPrices.forEach(price => {
                    const volumeAtPrice = liquidations
                        .filter(l => parseFloat(l.price_level) === price)
                        .reduce((sum, l) => sum + parseFloat(l.volume), 0);
                    cumulativeSum += volumeAtPrice;
                    prices.push(price);
                    values.push(cumulativeSum);
                });
            }

            return { prices, values };
        }

        // Auto-load on page load
        window.onload = () => {
            loadLevels();
        };
    </script>
</body>
</html>
