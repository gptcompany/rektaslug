name: Core Deploy

on:
  push:
    branches: [master]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/liquidationheatmap/**"
      - "scripts/run-ccxt-gap-fill.sh"
      - "scripts/run-gapfill-daemon.sh"
      - ".github/workflows/core-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: core-deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build Core Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rektaslug-core
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Core
    needs: build-and-publish
    runs-on: ubuntu-latest

    steps:
      - name: Detect deploy configuration
        id: cfg
        env:
          CORE_DEPLOY_HOST: ${{ secrets.CORE_DEPLOY_HOST }}
          CORE_DEPLOY_USER: ${{ secrets.CORE_DEPLOY_USER }}
          CORE_DEPLOY_PATH: ${{ secrets.CORE_DEPLOY_PATH }}
          CORE_DEPLOY_SSH_KEY: ${{ secrets.CORE_DEPLOY_SSH_KEY }}
          CORE_DEPLOY_GHCR_USER: ${{ secrets.CORE_DEPLOY_GHCR_USER }}
          CORE_DEPLOY_GHCR_TOKEN: ${{ secrets.CORE_DEPLOY_GHCR_TOKEN }}
        run: |
          if [ -n "$CORE_DEPLOY_HOST" ] && [ -n "$CORE_DEPLOY_USER" ] && [ -n "$CORE_DEPLOY_PATH" ] && [ -n "$CORE_DEPLOY_SSH_KEY" ] && [ -n "$CORE_DEPLOY_GHCR_USER" ] && [ -n "$CORE_DEPLOY_GHCR_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.cfg.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CORE_DEPLOY_HOST }}
          username: ${{ secrets.CORE_DEPLOY_USER }}
          key: ${{ secrets.CORE_DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "${{ secrets.CORE_DEPLOY_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.CORE_DEPLOY_GHCR_USER }}" --password-stdin
            cd "${{ secrets.CORE_DEPLOY_PATH }}"
            git fetch origin
            git checkout master
            git pull --ff-only origin master
            bash ./scripts/deploy-core.sh
            docker image prune -f

      - name: Publish deploy summary
        if: steps.cfg.outputs.enabled != 'true'
        run: |
          {
            echo "## Core Deploy"
            echo
            echo "Image build/publish completed."
            echo "Remote deploy was skipped because the required deployment secrets are not configured."
            echo
            echo "Required secrets:"
            echo "- CORE_DEPLOY_HOST"
            echo "- CORE_DEPLOY_USER"
            echo "- CORE_DEPLOY_PATH"
            echo "- CORE_DEPLOY_SSH_KEY"
            echo "- CORE_DEPLOY_GHCR_USER"
            echo "- CORE_DEPLOY_GHCR_TOKEN"
          } >> "$GITHUB_STEP_SUMMARY"
